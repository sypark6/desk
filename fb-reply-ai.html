<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Comment Reply AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #14171f;
    --surface2: #1c2030;
    --border: #252a3a;
    --blue: #1877f2;
    --blue-dim: rgba(24,119,242,0.15);
    --blue-glow: rgba(24,119,242,0.35);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --red: #ef4444;
    --text: #e8eaf0;
    --muted: #7a8099;
    --accent: #a78bfa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding: 32px 16px 60px;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(24,119,242,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }

  .logo {
    width: 44px; height: 44px;
    background: var(--blue);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px var(--blue-glow);
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-text p {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  .badge {
    margin-left: auto;
    background: var(--blue-dim);
    border: 1px solid rgba(24,119,242,0.3);
    color: #60a5fa;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .card:focus-within {
    border-color: rgba(24,119,242,0.4);
  }

  .label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .label-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 6px var(--blue);
  }

  /* Business Profile */
  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .input-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-wrap small {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }

  input[type="text"], textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: rgba(24,119,242,0.5);
    box-shadow: 0 0 0 3px rgba(24,119,242,0.08);
  }

  select option { background: var(--surface2); }

  textarea { line-height: 1.6; min-height: 80px; }

  /* Comment area */
  .comment-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .comment-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .comment-meta strong {
    color: #93c5fd;
    font-weight: 500;
  }

  .comment-content {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
  }

  /* Tone chips */
  .tone-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tone-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
    user-select: none;
  }

  .tone-chip:hover { border-color: rgba(24,119,242,0.4); color: var(--text); }
  .tone-chip.active {
    background: var(--blue-dim);
    border-color: rgba(24,119,242,0.5);
    color: #93c5fd;
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: var(--blue);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(24,119,242,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-generate:hover:not(:disabled) {
    background: #1565d8;
    box-shadow: 0 6px 28px rgba(24,119,242,0.45);
    transform: translateY(-1px);
  }

  .btn-generate:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Results */
  #results { display: none; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .reply-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    transition: border-color 0.2s;
  }

  .reply-card:hover { border-color: rgba(24,119,242,0.3); }

  .reply-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .reply-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .reply-actions {
    display: flex;
    gap: 8px;
  }

  .btn-copy, .btn-use {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 7px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }

  .btn-copy {
    background: transparent;
    color: var(--muted);
  }

  .btn-copy:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }

  .btn-use {
    background: var(--blue-dim);
    border-color: rgba(24,119,242,0.35);
    color: #93c5fd;
  }

  .btn-use:hover { background: rgba(24,119,242,0.25); }

  .reply-text {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* Loader */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 32px;
    color: var(--muted);
    font-size: 14px;
  }

  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    animation: bounce 1.2s infinite;
  }

  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Sentiment indicator */
  .sentiment-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .sentiment-tag {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 500;
  }

  .sentiment-positive { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
  .sentiment-negative { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
  .sentiment-neutral { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
  .sentiment-question { background: rgba(167,139,250,0.1); color: var(--accent); border: 1px solid rgba(167,139,250,0.25); }

  @media (max-width: 500px) {
    .profile-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">💬</div>
    <div class="logo-text">
      <h1>Comment Reply AI</h1>
      <p>Facebook Business · Powered by Claude</p>
    </div>
    <div class="badge">AI</div>
  </header>

  <!-- Business Context -->
  <div class="card">
    <div class="label"><span class="label-dot"></span>Business Profile</div>
    <div class="profile-grid">
      <div class="input-wrap">
        <small>Business Name</small>
        <input type="text" id="bizName" placeholder="e.g. Bella's Bakery" />
      </div>
      <div class="input-wrap">
        <small>Industry / Type</small>
        <input type="text" id="bizType" placeholder="e.g. Bakery, SaaS, Real Estate" />
      </div>
      <div class="input-wrap" style="grid-column: 1 / -1;">
        <small>Brand Personality (optional)</small>
        <input type="text" id="bizPersonality" placeholder="e.g. warm and friendly, professional, playful" />
      </div>
    </div>
  </div>

  <!-- Comment Input -->
  <div class="card">
    <div class="label"><span class="label-dot"></span>Facebook Comment</div>
    <div class="comment-box">
      <div class="avatar">👤</div>
      <div style="flex: 1;">
        <div class="comment-meta"><strong>Customer</strong> · just now</div>
        <textarea id="commentText" placeholder="Paste the customer's comment here..." rows="3"></textarea>
      </div>
    </div>
  </div>

  <!-- Tone -->
  <div class="card">
    <div class="label"><span class="label-dot"></span>Reply Tone</div>
    <div class="tone-grid" id="toneGrid">
      <div class="tone-chip active" data-tone="friendly">😊 Friendly</div>
      <div class="tone-chip" data-tone="professional">💼 Professional</div>
      <div class="tone-chip" data-tone="empathetic">🤝 Empathetic</div>
      <div class="tone-chip" data-tone="apologetic">🙏 Apologetic</div>
      <div class="tone-chip" data-tone="enthusiastic">🎉 Enthusiastic</div>
      <div class="tone-chip" data-tone="concise">⚡ Concise</div>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generateReplies()">
    <span>✦</span> Generate Replies
  </button>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <div class="results-title">
        <span>◈</span> AI-Generated Replies
      </div>
      <div id="sentimentRow" class="sentiment-row"></div>
    </div>
    <div id="repliesContainer"></div>
  </div>

</div>

<script>
  // Tone selection
  document.querySelectorAll('.tone-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });

  async function generateReplies() {
    const comment = document.getElementById('commentText').value.trim();
    if (!comment) { alert('Please paste a comment first.'); return; }

    const bizName = document.getElementById('bizName').value.trim() || 'our business';
    const bizType = document.getElementById('bizType').value.trim() || 'business';
    const bizPersonality = document.getElementById('bizPersonality').value.trim() || 'professional and helpful';
    const tone = document.querySelector('.tone-chip.active')?.dataset.tone || 'friendly';

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> Generating...';

    const results = document.getElementById('results');
    results.style.display = 'block';
    document.getElementById('repliesContainer').innerHTML = `<div class="loader"><span class="dots"><span></span><span></span><span></span></span> Reading comment & crafting replies...</div>`;
    document.getElementById('sentimentRow').innerHTML = '';

    const prompt = `You are a social media manager for "${bizName}", a ${bizType} known for being ${bizPersonality}.

A customer left this Facebook comment:
"${comment}"

Task:
1. Detect the sentiment: positive, negative, neutral, or question
2. Generate exactly 3 different reply options with tone: ${tone}

Rules:
- Each reply should feel human, warm, and on-brand
- Keep replies under 3 sentences unless the situation truly requires more
- Reference the business name naturally if relevant
- If negative/complaint: acknowledge, apologize if needed, offer resolution
- If positive: thank genuinely, don't be sycophantic
- If question: answer helpfully, invite to DM/contact for more
- Do NOT use emojis unless the tone is enthusiastic or friendly
- Do NOT start all replies the same way

Respond ONLY in this JSON format (no markdown, no extra text):
{
  "sentiment": "positive|negative|neutral|question",
  "replies": [
    {"label": "Option A", "text": "..."},
    {"label": "Option B", "text": "..."},
    {"label": "Option C", "text": "..."}
  ]
}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const raw = data.content?.map(b => b.text || '').join('').trim();
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      // Sentiment
      const sentMap = {
        positive: ['😊 Positive', 'sentiment-positive'],
        negative: ['😟 Negative', 'sentiment-negative'],
        neutral: ['😐 Neutral', 'sentiment-neutral'],
        question: ['❓ Question', 'sentiment-question'],
      };
      const [sentLabel, sentClass] = sentMap[parsed.sentiment] || ['— Unknown', 'sentiment-neutral'];
      document.getElementById('sentimentRow').innerHTML = `<span class="sentiment-tag ${sentClass}">${sentLabel}</span>`;

      // Replies
      const container = document.getElementById('repliesContainer');
      container.innerHTML = parsed.replies.map((r, i) => `
        <div class="reply-card">
          <div class="reply-card-header">
            <span class="reply-label">${r.label || `Option ${i+1}`}</span>
            <div class="reply-actions">
              <button class="btn-copy" onclick="copyReply(this, ${i})">Copy</button>
              <button class="btn-use" onclick="useReply(${i})">Use This</button>
            </div>
          </div>
          <div class="reply-text" id="reply-${i}">${escapeHtml(r.text)}</div>
        </div>
      `).join('');

      window._replies = parsed.replies;

    } catch (err) {
      document.getElementById('repliesContainer').innerHTML = `<div style="color: var(--red); padding: 16px; text-align: center; font-size: 14px;">Something went wrong. Please try again.</div>`;
    }

    btn.disabled = false;
    btn.innerHTML = '<span>✦</span> Regenerate';
  }

  function copyReply(btn, idx) {
    const text = window._replies?.[idx]?.text || '';
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function useReply(idx) {
    const text = window._replies?.[idx]?.text || '';
    navigator.clipboard.writeText(text);
    alert('Copied! Paste it directly into Facebook.');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
